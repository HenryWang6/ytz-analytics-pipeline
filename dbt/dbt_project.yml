name: 'ytz_analytics'
version: '1.0.0'
config-version: 2

profile: 'ytz_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  ytz_analytics:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts

seeds:
  ytz_analytics:
    +schema: seeds

snapshots:
  ytz_analytics:
    +schema: snapshots
