version: 2

models:
  - name: dim_dates
    description: >
      Standard date dimension spanning 2024-2030 with calendar attributes.
      Generated via dbt_utils.date_spine — one row per day.
    columns:
      - name: date_id
        description: Primary key — date value (one row per calendar day)
        tests:
          - unique
          - not_null
      - name: date_day
        description: Same as date_id — the calendar date
        tests:
          - not_null
      - name: year
        description: 4-digit year (e.g., 2026)
        tests:
          - not_null
      - name: month
        description: Month number 1-12
        tests:
          - not_null
      - name: day
        description: Day of month 1-31
        tests:
          - not_null
      - name: quarter
        description: Calendar quarter 1-4
        tests:
          - not_null
      - name: day_of_week
        description: Day of week 0-6, where 0=Sunday (Snowflake default)
        tests:
          - not_null
      - name: day_of_year
        description: Day of year 1-366
        tests:
          - not_null
      - name: week_of_year
        description: ISO week number 1-53
        tests:
          - not_null
      - name: month_name
        description: Full month name (e.g., 'January')
        tests:
          - not_null
      - name: day_name
        description: Full day name (e.g., 'Monday')
        tests:
          - not_null
      - name: is_weekend
        description: Boolean — TRUE for Saturday and Sunday
        tests:
          - not_null
      - name: year_month
        description: Year-month as 'YYYY-MM' string for grouping
        tests:
          - not_null

  - name: int_flights_enriched
    description: >
      Central join point that enriches staging data (stg_raw_flights) with all
      dimension tables — dim_airlines (current SCD2 version), dim_airports
      (departure and arrival, current SCD2 version), and dim_dates (scheduled
      and actual operation dates). Pre-computes derived columns for on-time
      performance, delay buckets, cancellation status, and the actual operation
      date. Preserves ALL rows (both operating and marketing carrier roles) —
      carrier_role filtering happens downstream in fct_flights.

    columns:
      - name: flight_id
        description: >
          Surrogate key hashed from flight_date, operating_flight_iata, and
          direction. Identical across all codeshare rows of the same physical flight.
        tests:
          - not_null

      - name: flight_date
        description: Scheduled date of the flight (YYYY-MM-DD)
        tests:
          - not_null

      - name: direction
        description: Flight direction relative to YTZ — DEPARTURE or ARRIVAL
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['DEPARTURE', 'ARRIVAL']

      - name: flight_status
        description: >
          Current flight status per AviationStack API.
          Expected values: scheduled, active, actual, cancelled, canceled,
          incident, diverted.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['scheduled', 'active', 'actual', 'cancelled', 'canceled', 'incident', 'diverted']

      - name: dep_iata
        description: IATA code of the departure airport
        tests:
          - not_null

      - name: dep_airport_name
        description: Full name of the departure airport from the API payload

      - name: arr_iata
        description: IATA code of the arrival airport
        tests:
          - not_null

      - name: arr_airport_name
        description: Full name of the arrival airport from the API payload

      - name: airline_iata
        description: >
          IATA code of the airline on this row. For marketing/codeshare rows,
          this is the marketing carrier (not the operator).
        tests:
          - not_null

      - name: airline_name
        description: Full name of the airline on this row from the API payload

      - name: airline_icao
        description: ICAO code of the airline from the API payload

      - name: flight_iata
        description: >
          IATA flight number of the marketing carrier (e.g., 'EK123').
          For codeshare rows, this is the marketing carrier's flight number.

      - name: carrier_role
        description: >
          Role of the airline on this row. 'operating' means this airline flies
          the aircraft. 'marketing' means this airline sells the ticket under a
          codeshare agreement.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['operating', 'marketing']

      - name: operating_airline_iata
        description: >
          IATA code of the airline that actually operates the aircraft.
          For operating rows, equals airline_iata. For marketing rows,
          extracted from the codeshared sub-object.

      - name: operating_flight_iata
        description: >
          IATA flight number of the actual aircraft operator (e.g., 'PD101').
          For operating rows, equals flight_iata. For marketing rows,
          extracted from the codeshared sub-object.

      - name: sched_dep
        description: Scheduled departure time (with timezone)
        tests:
          - not_null

      - name: sched_arr
        description: Scheduled arrival time (with timezone)
        tests:
          - not_null

      - name: actual_dep
        description: >
          Actual departure time (with timezone). NULL if the flight has not yet
          departed or was cancelled.

      - name: actual_arr
        description: >
          Actual arrival time (with timezone). NULL if the flight has not yet
          arrived or was cancelled.

      - name: delay_dep
        description: Departure delay in minutes. Negative values indicate early departure.

      - name: delay_arr
        description: Arrival delay in minutes. Negative values indicate early arrival.

      - name: gate_dep
        description: Departure gate at YTZ or origin airport

      - name: gate_arr
        description: Arrival gate at YTZ or destination airport

      - name: baggage
        description: Baggage claim belt at the arrival airport

      - name: terminal_dep
        description: Departure terminal

      - name: terminal_arr
        description: Arrival terminal

      - name: aircraft_icao24
        description: ICAO 24-bit aircraft address (hex string, e.g., 'C06363')

      - name: extracted_at
        description: Timestamp when this flight record was loaded into Snowflake
        tests:
          - not_null

      - name: target_airport
        description: The monitored airport for this pipeline (always YTZ)
        tests:
          - not_null

      - name: dim_airline_name
        description: >
          Airline name from the dim_airlines SCD2 dimension (current version only).
          NULL when the airline is not yet present in the dimension table.

      - name: dim_airline_icao
        description: >
          Airline ICAO code from the dim_airlines SCD2 dimension (current version only).
          NULL when the airline is not yet present in the dimension table.

      - name: dim_dep_airport_name
        description: >
          Departure airport name from the dim_airports SCD2 dimension (current version only).
          NULL when the airport is not yet present in the dimension table.

      - name: dim_arr_airport_name
        description: >
          Arrival airport name from the dim_airports SCD2 dimension (current version only).
          NULL when the airport is not yet present in the dimension table.

      - name: sched_year
        description: 4-digit year of the scheduled flight date (from dim_dates)
        tests:
          - not_null

      - name: sched_month
        description: Month number (1-12) of the scheduled flight date (from dim_dates)
        tests:
          - not_null

      - name: sched_day_name
        description: Full day name (e.g., 'Monday') of the scheduled flight date (from dim_dates)
        tests:
          - not_null

      - name: sched_is_weekend
        description: Boolean — TRUE if the scheduled flight date is Saturday or Sunday (from dim_dates)
        tests:
          - not_null

      - name: actual_operation_date
        description: >
          Date on which the flight actually operated, derived from the earlier of
          actual_dep or actual_arr. NULL for cancelled or non-operated flights.

      - name: is_on_time_dep
        description: >
          TRUE when delay_dep <= 15 minutes AND actual_dep IS NOT NULL.
          FALSE when the flight departed with a delay > 15 minutes.
          NULL when actual_dep IS NULL (flight hasn't departed or was cancelled).

      - name: is_on_time_arr
        description: >
          TRUE when delay_arr <= 15 minutes AND actual_arr IS NOT NULL.
          FALSE when the flight arrived with a delay > 15 minutes.
          NULL when actual_arr IS NULL (flight hasn't arrived or was cancelled).

      - name: delay_bucket_dep
        description: >
          Departure delay categorized into buckets: 'On Time' (<=15 min),
          '15-30 min' (16-30), '30-60 min' (31-60), '60+ min' (>60).
          NULL when actual_dep IS NULL.
        tests:
          - accepted_values:
              arguments:
                values: ['On Time', '15-30 min', '30-60 min', '60+ min']

      - name: delay_bucket_arr
        description: >
          Arrival delay categorized into buckets: 'On Time' (<=15 min),
          '15-30 min' (16-30), '30-60 min' (31-60), '60+ min' (>60).
          NULL when actual_arr IS NULL.
        tests:
          - accepted_values:
              arguments:
                values: ['On Time', '15-30 min', '30-60 min', '60+ min']

      - name: is_cancelled
        description: >
          TRUE when flight_status is 'cancelled' or 'canceled' (case-insensitive).
          FALSE for all other statuses.
        tests:
          - not_null

      - name: actual_year
        description: 4-digit year of the actual operation date (from dim_dates). NULL when actual_operation_date IS NULL.

      - name: actual_month
        description: Month number (1-12) of the actual operation date (from dim_dates). NULL when actual_operation_date IS NULL.

      - name: actual_day_name
        description: Full day name of the actual operation date (from dim_dates). NULL when actual_operation_date IS NULL.

      - name: actual_is_weekend
        description: Boolean — TRUE if the actual operation date is Saturday or Sunday (from dim_dates). NULL when actual_operation_date IS NULL.

  - name: fct_flights
    description: >
      Incremental fact table — one row per operating flight event (departure or
      arrival) at YTZ. Filtered to carrier_role = 'operating' to deduplicate
      codeshare rows. Materialized as incremental merge on flight_id so that
      mutable flight status fields (actual times, delays, cancellation) are
      updated in place on each run. A 3-day look-back window re-processes
      recent flights to catch status transitions across consecutive extracts.

    columns:
      - name: flight_id
        description: >
          Surrogate key hashed from flight_date, operating_flight_iata, and
          direction. Serves as the merge unique_key — identical rows update
          in place, new rows insert.
        tests:
          - unique
          - not_null

      - name: flight_date
        description: Scheduled date of the flight (YYYY-MM-DD)
        tests:
          - not_null

      - name: direction
        description: Flight direction relative to YTZ — DEPARTURE or ARRIVAL
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['DEPARTURE', 'ARRIVAL']

      - name: flight_status
        description: >
          Current flight status per AviationStack API. Mutable — updated via
          merge when the flight progresses (scheduled -> active -> landed/diverted).
          Expected values: scheduled, active, actual, cancelled, canceled,
          incident, diverted.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['scheduled', 'active', 'actual', 'cancelled', 'canceled', 'incident', 'diverted']

      - name: dep_iata
        description: IATA code of the departure airport
        tests:
          - not_null

      - name: dep_airport_name
        description: Full name of the departure airport from the API payload

      - name: arr_iata
        description: IATA code of the arrival airport
        tests:
          - not_null

      - name: arr_airport_name
        description: Full name of the arrival airport from the API payload

      - name: airline_iata
        description: IATA code of the operating airline (post-filter to operating rows)
        tests:
          - not_null

      - name: airline_name
        description: Full name of the operating airline from the API payload

      - name: airline_icao
        description: ICAO code of the operating airline from the API payload

      - name: flight_iata
        description: IATA flight number of the operating carrier

      - name: operating_airline_iata
        description: IATA code of the airline that physically operates the aircraft
        tests:
          - not_null

      - name: operating_flight_iata
        description: IATA flight number of the actual aircraft operator (e.g., 'PD101')
        tests:
          - not_null

      - name: sched_dep
        description: >
          Scheduled departure time (with timezone). Static — never changes
          after initial insert.
        tests:
          - not_null

      - name: sched_arr
        description: >
          Scheduled arrival time (with timezone). Static — never changes
          after initial insert.
        tests:
          - not_null

      - name: actual_dep
        description: >
          Actual departure time (with timezone). NULL if the flight has not yet
          departed or was cancelled. Updated via merge when the flight progresses.

      - name: actual_arr
        description: >
          Actual arrival time (with timezone). NULL if the flight has not yet
          arrived or was cancelled. Updated via merge when the flight progresses.

      - name: delay_dep
        description: >
          Departure delay in minutes. Negative values indicate early departure.
          Updated via merge as the flight progresses.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -60
              max_value: 1440
              row_condition: "delay_dep IS NOT NULL"

      - name: delay_arr
        description: >
          Arrival delay in minutes. Negative values indicate early arrival.
          Updated via merge as the flight progresses.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -60
              max_value: 1440
              row_condition: "delay_arr IS NOT NULL"

      - name: gate_dep
        description: Departure gate at YTZ or origin airport

      - name: gate_arr
        description: Arrival gate at YTZ or destination airport

      - name: baggage
        description: Baggage claim belt at the arrival airport

      - name: terminal_dep
        description: Departure terminal

      - name: terminal_arr
        description: Arrival terminal

      - name: aircraft_icao24
        description: ICAO 24-bit aircraft address (hex string, e.g., 'C06363')

      - name: extracted_at
        description: Timestamp when this flight record was loaded into Snowflake
        tests:
          - not_null

      - name: target_airport
        description: The monitored airport for this pipeline (always YTZ)
        tests:
          - not_null

      - name: dim_airline_name
        description: >
          Airline name from the dim_airlines SCD2 dimension (current version only).
          NULL when the airline is not yet present in the dimension table.

      - name: dim_airline_icao
        description: >
          Airline ICAO code from the dim_airlines SCD2 dimension (current version only).
          NULL when the airline is not yet present in the dimension table.

      - name: dim_dep_airport_name
        description: >
          Departure airport name from the dim_airports SCD2 dimension (current version only).
          NULL when the airport is not yet present in the dimension table.

      - name: dim_arr_airport_name
        description: >
          Arrival airport name from the dim_airports SCD2 dimension (current version only).
          NULL when the airport is not yet present in the dimension table.

      - name: sched_year
        description: 4-digit year of the scheduled flight date (from dim_dates)
        tests:
          - not_null

      - name: sched_month
        description: Month number (1-12) of the scheduled flight date (from dim_dates)
        tests:
          - not_null

      - name: sched_day_name
        description: Full day name (e.g., 'Monday') of the scheduled flight date (from dim_dates)
        tests:
          - not_null

      - name: sched_is_weekend
        description: Boolean — TRUE if the scheduled flight date is Saturday or Sunday (from dim_dates)
        tests:
          - not_null

      - name: actual_operation_date
        description: >
          Date on which the flight actually operated, derived from the earlier of
          actual_dep or actual_arr. NULL for cancelled or non-operated flights.
          Updated via merge when actual times become available.

      - name: is_on_time_dep
        description: >
          TRUE when delay_dep <= 15 minutes AND actual_dep IS NOT NULL.
          FALSE when the flight departed with a delay > 15 minutes.
          NULL when actual_dep IS NULL (flight hasn't departed or was cancelled).
          Updated via merge as the flight progresses.

      - name: is_on_time_arr
        description: >
          TRUE when delay_arr <= 15 minutes AND actual_arr IS NOT NULL.
          FALSE when the flight arrived with a delay > 15 minutes.
          NULL when actual_arr IS NULL (flight hasn't arrived or was cancelled).
          Updated via merge as the flight progresses.

      - name: delay_bucket_dep
        description: >
          Departure delay categorized into buckets: 'On Time' (<=15 min),
          '15-30 min' (16-30), '30-60 min' (31-60), '60+ min' (>60).
          NULL when actual_dep IS NULL. Updated via merge as the flight progresses.
        tests:
          - accepted_values:
              arguments:
                values: ['On Time', '15-30 min', '30-60 min', '60+ min']

      - name: delay_bucket_arr
        description: >
          Arrival delay categorized into buckets: 'On Time' (<=15 min),
          '15-30 min' (16-30), '30-60 min' (31-60), '60+ min' (>60).
          NULL when actual_arr IS NULL. Updated via merge as the flight progresses.
        tests:
          - accepted_values:
              arguments:
                values: ['On Time', '15-30 min', '30-60 min', '60+ min']

      - name: is_cancelled
        description: >
          TRUE when flight_status is 'cancelled' or 'canceled' (case-insensitive).
          FALSE for all other statuses. Updated via merge if a flight transitions
          to cancelled.
        tests:
          - not_null

      - name: actual_year
        description: 4-digit year of the actual operation date (from dim_dates). NULL when actual_operation_date IS NULL.

      - name: actual_month
        description: Month number (1-12) of the actual operation date (from dim_dates). NULL when actual_operation_date IS NULL.

      - name: actual_day_name
        description: Full day name of the actual operation date (from dim_dates). NULL when actual_operation_date IS NULL.

      - name: actual_is_weekend
        description: Boolean — TRUE if the actual operation date is Saturday or Sunday (from dim_dates). NULL when actual_operation_date IS NULL.

snapshots:
  - name: dim_airlines
    description: >
      SCD Type 2 dimension tracking airline metadata changes over time.
      Keyed on airline_iata. A new row is inserted whenever airline_name
      or airline_icao changes for a given IATA code. Sourced from distinct
      airlines observed in stg_raw_flights.
    columns:
      - name: airline_iata
        description: >
          IATA two-letter airline designator (e.g., 'PD' for Porter Airlines).
          Serves as the natural key for this dimension.
        tests:
          - unique
          - not_null
      - name: airline_name
        description: >
          Full name of the airline (e.g., 'Porter Airlines'). Tracked for
          changes — airlines occasionally rebrand while retaining their IATA code.
        tests:
          - not_null
      - name: airline_icao
        description: >
          ICAO three-letter airline designator (e.g., 'PTR' for Porter Airlines).
          NULL when the airline has no ICAO code assigned or the API omits it.
      - name: dbt_valid_from
        description: >
          Timestamp when this version of the airline record became effective.
          Set by dbt at snapshot time.
        tests:
          - not_null
      - name: dbt_valid_to
        description: >
          Timestamp when this version of the airline record was superseded.
          NULL for the current (active) version.
      - name: dbt_scd_id
        description: >
          Surrogate key generated by dbt for each snapshot row. Unique across
          all versions of all airlines.
        tests:
          - unique
          - not_null

  - name: dim_airports
    description: >
      SCD Type 2 dimension tracking airport name changes over time.
      Keyed on airport_iata. A new row is inserted when airport_name
      changes for a given IATA code. Built from the union of departure
      and arrival airports observed in stg_raw_flights.
    columns:
      - name: airport_iata
        description: >
          IATA three-letter airport code (e.g., 'YTZ' for Toronto Island).
          Serves as the natural key for this dimension.
        tests:
          - unique
          - not_null
      - name: airport_name
        description: >
          Full name of the airport (e.g., 'Billy Bishop Toronto City Airport').
          Tracked for changes — airport names can change due to renaming or
          rebranding while the IATA code remains stable.
        tests:
          - not_null
      - name: dbt_valid_from
        description: >
          Timestamp when this version of the airport record became effective.
          Set by dbt at snapshot time.
        tests:
          - not_null
      - name: dbt_valid_to
        description: >
          Timestamp when this version of the airport record was superseded.
          NULL for the current (active) version.
      - name: dbt_scd_id
        description: >
          Surrogate key generated by dbt for each snapshot row. Unique across
          all versions of all airports.
        tests:
          - unique
          - not_null
