version: 2

models:
  - name: dim_dates
    description: >
      Standard date dimension spanning 2024-2030 with calendar attributes.
      Generated via dbt_utils.date_spine — one row per day.
    columns:
      - name: date_id
        description: Primary key — date value (one row per calendar day)
        tests:
          - unique
          - not_null
      - name: date_day
        description: Same as date_id — the calendar date
        tests:
          - not_null
      - name: year
        description: 4-digit year (e.g., 2026)
        tests:
          - not_null
      - name: month
        description: Month number 1-12
        tests:
          - not_null
      - name: day
        description: Day of month 1-31
        tests:
          - not_null
      - name: quarter
        description: Calendar quarter 1-4
        tests:
          - not_null
      - name: day_of_week
        description: Day of week 0-6, where 0=Sunday (Snowflake default)
        tests:
          - not_null
      - name: day_of_year
        description: Day of year 1-366
        tests:
          - not_null
      - name: week_of_year
        description: ISO week number 1-53
        tests:
          - not_null
      - name: month_name
        description: Full month name (e.g., 'January')
        tests:
          - not_null
      - name: day_name
        description: Full day name (e.g., 'Monday')
        tests:
          - not_null
      - name: is_weekend
        description: Boolean — TRUE for Saturday and Sunday
        tests:
          - not_null
      - name: year_month
        description: Year-month as 'YYYY-MM' string for grouping
        tests:
          - not_null

  - name: int_flights_enriched
    description: >
      Central join point that enriches staging data (stg_raw_flights) with all
      dimension tables — dim_airlines (current SCD2 version), dim_airports
      (departure and arrival, current SCD2 version), and dim_dates (scheduled
      and actual operation dates). Pre-computes derived columns for on-time
      performance, delay buckets, cancellation status, and the actual operation
      date. Preserves ALL rows (both operating and marketing carrier roles) —
      carrier_role filtering happens downstream in fct_flights.

    columns:
      - name: flight_id
        description: >
          Surrogate key hashed from flight_date, operating_flight_iata, and
          direction. Identical across all codeshare rows of the same physical flight.
        tests:
          - not_null

      - name: flight_date
        description: Scheduled date of the flight (YYYY-MM-DD)
        tests:
          - not_null

      - name: direction
        description: Flight direction relative to YTZ — DEPARTURE or ARRIVAL
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['DEPARTURE', 'ARRIVAL']

      - name: flight_status
        description: >
          Current flight status per AviationStack API.
          Expected values: scheduled, active, actual, cancelled, canceled,
          incident, diverted. NULL for incomplete API records.
        tests:
          - accepted_values:
              arguments:
                values: ['scheduled', 'active', 'actual', 'cancelled', 'canceled', 'incident', 'diverted']

      - name: dep_iata
        description: IATA code of the departure airport
        tests:
          - not_null

      - name: dep_airport_name
        description: Full name of the departure airport from the API payload

      - name: arr_iata
        description: >
          IATA code of the arrival airport. NULL for incomplete API records.

      - name: arr_airport_name
        description: Full name of the arrival airport from the API payload

      - name: airline_iata
        description: >
          IATA code of the airline on this row. For marketing/codeshare rows,
          this is the marketing carrier (not the operator). NULL when the API
          omits airline data for incomplete records.

      - name: airline_name
        description: Full name of the airline on this row from the API payload

      - name: airline_icao
        description: ICAO code of the airline from the API payload

      - name: flight_iata
        description: >
          IATA flight number of the marketing carrier (e.g., 'EK123').
          For codeshare rows, this is the marketing carrier's flight number.

      - name: carrier_role
        description: >
          Role of the airline on this row. 'operating' means this airline flies
          the aircraft. 'marketing' means this airline sells the ticket under a
          codeshare agreement.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['operating', 'marketing']

      - name: operating_airline_iata
        description: >
          IATA code of the airline that actually operates the aircraft.
          For operating rows, equals airline_iata. For marketing rows,
          extracted from the codeshared sub-object.

      - name: operating_flight_iata
        description: >
          IATA flight number of the actual aircraft operator (e.g., 'PD101').
          For operating rows, equals flight_iata. For marketing rows,
          extracted from the codeshared sub-object.

      - name: sched_dep
        description: Scheduled departure time (with timezone)
        tests:
          - not_null

      - name: sched_arr
        description: Scheduled arrival time (with timezone)
        tests:
          - not_null

      - name: actual_dep
        description: >
          Actual departure time (with timezone). NULL if the flight has not yet
          departed or was cancelled.

      - name: actual_arr
        description: >
          Actual arrival time (with timezone). NULL if the flight has not yet
          arrived or was cancelled.

      - name: delay_dep
        description: Departure delay in minutes. Negative values indicate early departure.

      - name: delay_arr
        description: Arrival delay in minutes. Negative values indicate early arrival.

      - name: gate_dep
        description: Departure gate at YTZ or origin airport

      - name: gate_arr
        description: Arrival gate at YTZ or destination airport

      - name: baggage
        description: Baggage claim belt at the arrival airport

      - name: terminal_dep
        description: Departure terminal

      - name: terminal_arr
        description: Arrival terminal

      - name: aircraft_icao24
        description: ICAO 24-bit aircraft address (hex string, e.g., 'C06363')

      - name: extracted_at
        description: Timestamp when this flight record was loaded into Snowflake
        tests:
          - not_null

      - name: target_airport
        description: The monitored airport for this pipeline (always YTZ)
        tests:
          - not_null

      - name: dim_airline_name
        description: >
          Airline name from the dim_airlines SCD2 dimension (current version only).
          NULL when the airline is not yet present in the dimension table.

      - name: dim_airline_icao
        description: >
          Airline ICAO code from the dim_airlines SCD2 dimension (current version only).
          NULL when the airline is not yet present in the dimension table.

      - name: dim_dep_airport_name
        description: >
          Departure airport name from the dim_airports SCD2 dimension (current version only).
          NULL when the airport is not yet present in the dimension table.

      - name: dim_arr_airport_name
        description: >
          Arrival airport name from the dim_airports SCD2 dimension (current version only).
          NULL when the airport is not yet present in the dimension table.

      - name: sched_year
        description: 4-digit year of the scheduled flight date (from dim_dates)
        tests:
          - not_null

      - name: sched_month
        description: Month number (1-12) of the scheduled flight date (from dim_dates)
        tests:
          - not_null

      - name: sched_day_name
        description: Full day name (e.g., 'Monday') of the scheduled flight date (from dim_dates)
        tests:
          - not_null

      - name: sched_is_weekend
        description: Boolean — TRUE if the scheduled flight date is Saturday or Sunday (from dim_dates)
        tests:
          - not_null

      - name: actual_operation_date
        description: >
          Date on which the flight actually operated, derived from the earlier of
          actual_dep or actual_arr. NULL for cancelled or non-operated flights.

      - name: is_on_time_dep
        description: >
          TRUE when delay_dep <= 15 minutes AND actual_dep IS NOT NULL.
          FALSE when the flight departed with a delay > 15 minutes.
          NULL when actual_dep IS NULL (flight hasn't departed or was cancelled).

      - name: is_on_time_arr
        description: >
          TRUE when delay_arr <= 15 minutes AND actual_arr IS NOT NULL.
          FALSE when the flight arrived with a delay > 15 minutes.
          NULL when actual_arr IS NULL (flight hasn't arrived or was cancelled).

      - name: delay_bucket_dep
        description: >
          Departure delay categorized into buckets: 'On Time' (<=15 min),
          '15-30 min' (16-30), '30-60 min' (31-60), '60+ min' (>60).
          NULL when actual_dep IS NULL.
        tests:
          - accepted_values:
              arguments:
                values: ['On Time', '15-30 min', '30-60 min', '60+ min']

      - name: delay_bucket_arr
        description: >
          Arrival delay categorized into buckets: 'On Time' (<=15 min),
          '15-30 min' (16-30), '30-60 min' (31-60), '60+ min' (>60).
          NULL when actual_arr IS NULL.
        tests:
          - accepted_values:
              arguments:
                values: ['On Time', '15-30 min', '30-60 min', '60+ min']

      - name: is_cancelled
        description: >
          TRUE when flight_status is 'cancelled' or 'canceled' (case-insensitive).
          FALSE for all other statuses.
        tests:
          - not_null

      - name: actual_year
        description: 4-digit year of the actual operation date (from dim_dates). NULL when actual_operation_date IS NULL.

      - name: actual_month
        description: Month number (1-12) of the actual operation date (from dim_dates). NULL when actual_operation_date IS NULL.

      - name: actual_day_name
        description: Full day name of the actual operation date (from dim_dates). NULL when actual_operation_date IS NULL.

      - name: actual_is_weekend
        description: Boolean — TRUE if the actual operation date is Saturday or Sunday (from dim_dates). NULL when actual_operation_date IS NULL.

  - name: fct_flights
    description: >
      Incremental fact table — one row per operating flight event (departure or
      arrival) at YTZ. Filtered to carrier_role = 'operating' to deduplicate
      codeshare rows. Materialized as incremental merge on flight_id so that
      mutable flight status fields (actual times, delays, cancellation) are
      updated in place on each run. A 3-day look-back window re-processes
      recent flights to catch status transitions across consecutive extracts.

    columns:
      - name: flight_id
        description: >
          Surrogate key hashed from flight_date, operating_flight_iata, and
          direction. Serves as the merge unique_key — identical rows update
          in place, new rows insert.
        tests:
          - unique
          - not_null

      - name: flight_date
        description: Scheduled date of the flight (YYYY-MM-DD)
        tests:
          - not_null

      - name: direction
        description: Flight direction relative to YTZ — DEPARTURE or ARRIVAL
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['DEPARTURE', 'ARRIVAL']

      - name: flight_status
        description: >
          Current flight status per AviationStack API. Mutable — updated via
          merge when the flight progresses (scheduled -> active -> landed/diverted).
          Expected values: scheduled, active, actual, cancelled, canceled,
          incident, diverted. NULL for incomplete API records.
        tests:
          - accepted_values:
              arguments:
                values: ['scheduled', 'active', 'actual', 'cancelled', 'canceled', 'incident', 'diverted']

      - name: dep_iata
        description: IATA code of the departure airport
        tests:
          - not_null

      - name: dep_airport_name
        description: Full name of the departure airport from the API payload

      - name: arr_iata
        description: >
          IATA code of the arrival airport. NULL for incomplete API records.

      - name: arr_airport_name
        description: Full name of the arrival airport from the API payload

      - name: airline_iata
        description: >
          IATA code of the operating airline (post-filter to operating rows).
          NULL when the API omits airline data.

      - name: airline_name
        description: Full name of the operating airline from the API payload

      - name: airline_icao
        description: ICAO code of the operating airline from the API payload

      - name: flight_iata
        description: IATA flight number of the operating carrier

      - name: operating_airline_iata
        description: >
          IATA code of the airline that physically operates the aircraft.
          NULL when the airline data is missing from the API.

      - name: operating_flight_iata
        description: >
          IATA flight number of the actual aircraft operator (e.g., 'PD101').
          NULL when the flight data is missing from the API.

      - name: sched_dep
        description: >
          Scheduled departure time (with timezone). Static — never changes
          after initial insert.
        tests:
          - not_null

      - name: sched_arr
        description: >
          Scheduled arrival time (with timezone). Static — never changes
          after initial insert.
        tests:
          - not_null

      - name: actual_dep
        description: >
          Actual departure time (with timezone). NULL if the flight has not yet
          departed or was cancelled. Updated via merge when the flight progresses.

      - name: actual_arr
        description: >
          Actual arrival time (with timezone). NULL if the flight has not yet
          arrived or was cancelled. Updated via merge when the flight progresses.

      - name: delay_dep
        description: >
          Departure delay in minutes. Negative values indicate early departure.
          Updated via merge as the flight progresses.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: -60
                max_value: 1440
                row_condition: "delay_dep IS NOT NULL"

      - name: delay_arr
        description: >
          Arrival delay in minutes. Negative values indicate early arrival.
          Updated via merge as the flight progresses.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: -60
                max_value: 1440
                row_condition: "delay_arr IS NOT NULL"

      - name: gate_dep
        description: Departure gate at YTZ or origin airport

      - name: gate_arr
        description: Arrival gate at YTZ or destination airport

      - name: baggage
        description: Baggage claim belt at the arrival airport

      - name: terminal_dep
        description: Departure terminal

      - name: terminal_arr
        description: Arrival terminal

      - name: aircraft_icao24
        description: ICAO 24-bit aircraft address (hex string, e.g., 'C06363')

      - name: extracted_at
        description: Timestamp when this flight record was loaded into Snowflake
        tests:
          - not_null

      - name: target_airport
        description: The monitored airport for this pipeline (always YTZ)
        tests:
          - not_null

      - name: dim_airline_name
        description: >
          Airline name from the dim_airlines SCD2 dimension (current version only).
          NULL when the airline is not yet present in the dimension table.

      - name: dim_airline_icao
        description: >
          Airline ICAO code from the dim_airlines SCD2 dimension (current version only).
          NULL when the airline is not yet present in the dimension table.

      - name: dim_dep_airport_name
        description: >
          Departure airport name from the dim_airports SCD2 dimension (current version only).
          NULL when the airport is not yet present in the dimension table.

      - name: dim_arr_airport_name
        description: >
          Arrival airport name from the dim_airports SCD2 dimension (current version only).
          NULL when the airport is not yet present in the dimension table.

      - name: sched_year
        description: 4-digit year of the scheduled flight date (from dim_dates)
        tests:
          - not_null

      - name: sched_month
        description: Month number (1-12) of the scheduled flight date (from dim_dates)
        tests:
          - not_null

      - name: sched_day_name
        description: Full day name (e.g., 'Monday') of the scheduled flight date (from dim_dates)
        tests:
          - not_null

      - name: sched_is_weekend
        description: Boolean — TRUE if the scheduled flight date is Saturday or Sunday (from dim_dates)
        tests:
          - not_null

      - name: actual_operation_date
        description: >
          Date on which the flight actually operated, derived from the earlier of
          actual_dep or actual_arr. NULL for cancelled or non-operated flights.
          Updated via merge when actual times become available.

      - name: is_on_time_dep
        description: >
          TRUE when delay_dep <= 15 minutes AND actual_dep IS NOT NULL.
          FALSE when the flight departed with a delay > 15 minutes.
          NULL when actual_dep IS NULL (flight hasn't departed or was cancelled).
          Updated via merge as the flight progresses.

      - name: is_on_time_arr
        description: >
          TRUE when delay_arr <= 15 minutes AND actual_arr IS NOT NULL.
          FALSE when the flight arrived with a delay > 15 minutes.
          NULL when actual_arr IS NULL (flight hasn't arrived or was cancelled).
          Updated via merge as the flight progresses.

      - name: delay_bucket_dep
        description: >
          Departure delay categorized into buckets: 'On Time' (<=15 min),
          '15-30 min' (16-30), '30-60 min' (31-60), '60+ min' (>60).
          NULL when actual_dep IS NULL. Updated via merge as the flight progresses.
        tests:
          - accepted_values:
              arguments:
                values: ['On Time', '15-30 min', '30-60 min', '60+ min']

      - name: delay_bucket_arr
        description: >
          Arrival delay categorized into buckets: 'On Time' (<=15 min),
          '15-30 min' (16-30), '30-60 min' (31-60), '60+ min' (>60).
          NULL when actual_arr IS NULL. Updated via merge as the flight progresses.
        tests:
          - accepted_values:
              arguments:
                values: ['On Time', '15-30 min', '30-60 min', '60+ min']

      - name: is_cancelled
        description: >
          TRUE when flight_status is 'cancelled' or 'canceled' (case-insensitive).
          FALSE for all other statuses. Updated via merge if a flight transitions
          to cancelled.
        tests:
          - not_null

      - name: actual_year
        description: 4-digit year of the actual operation date (from dim_dates). NULL when actual_operation_date IS NULL.

      - name: actual_month
        description: Month number (1-12) of the actual operation date (from dim_dates). NULL when actual_operation_date IS NULL.

      - name: actual_day_name
        description: Full day name of the actual operation date (from dim_dates). NULL when actual_operation_date IS NULL.

      - name: actual_is_weekend
        description: Boolean — TRUE if the actual operation date is Saturday or Sunday (from dim_dates). NULL when actual_operation_date IS NULL.

  - name: gate_usage_summary
    description: >
      Gate-to-airline affinity matrix. One row per gate per airline. Only
      operating carrier flights are counted (carrier_role = 'operating').
      Departures and arrivals are tracked in separate count columns, with a
      combined total. Materialized as a full-refresh table — gate assignments
      do not change retroactively and data volume is small.

    columns:
      - name: gate
        description: Departure or arrival gate identifier (e.g., 'G1', 'A2')
        tests:
          - not_null

      - name: airline_iata
        description: IATA two-letter operating airline code (e.g., 'PD' for Porter Airlines)
        tests:
          - not_null

      - name: airline_name
        description: >
          Airline name from the dim_airlines SCD2 dimension (current version only).
          NULL when the airline is not yet present in the dimension table.

      - name: departure_count
        description: Number of departures from this gate by this airline
        tests:
          - not_null

      - name: arrival_count
        description: Number of arrivals at this gate by this airline
        tests:
          - not_null

      - name: total_flight_count
        description: Sum of departure_count and arrival_count
        tests:
          - not_null

  - name: daily_airport_summary
    description: >
      Daily airport-level summary aggregated by flight_date (scheduled date).
      Sources only operating carrier flights from fct_flights. Metrics include
      counts by direction, on-time performance (OTP) percentages, and cancellation
      rate. OTP denominators include only completed flights (actual_dep/actual_arr
      IS NOT NULL) — cancelled flights never operated and are excluded.
      Materialized as incremental delete+insert with a 7-day look-back window.

    columns:
      - name: flight_date
        description: Scheduled date of the flights (YYYY-MM-DD). One row per day.
        tests:
          - unique
          - not_null

      - name: total_scheduled
        description: Total number of scheduled flights (all statuses) for this date
        tests:
          - not_null

      - name: total_actual
        description: >
          Total number of flights that actually operated (status NOT cancelled/canceled)
          for this date
        tests:
          - not_null

      - name: scheduled_dep
        description: Number of scheduled departures for this date
        tests:
          - not_null

      - name: scheduled_arr
        description: Number of scheduled arrivals for this date
        tests:
          - not_null

      - name: actual_dep
        description: Number of departures that actually operated for this date
        tests:
          - not_null

      - name: actual_arr
        description: Number of arrivals that actually operated for this date
        tests:
          - not_null

      - name: on_time_dep
        description: >
          Number of departures with delay_dep <= 15 minutes. Only counts flights
          with a recorded actual departure time.
        tests:
          - not_null

      - name: on_time_arr
        description: >
          Number of arrivals with delay_arr <= 15 minutes. Only counts flights
          with a recorded actual arrival time.
        tests:
          - not_null

      - name: cancelled_count
        description: Number of cancelled flights for this date
        tests:
          - not_null

      - name: dep_otp_pct
        description: >
          Departure on-time performance percentage. Calculated as on_time_dep
          divided by flights with actual_dep IS NOT NULL. Rounded to 2 decimal places.
          NULL-safe via NULLIF denominator. NULL when no relevant flights operated.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100

      - name: arr_otp_pct
        description: >
          Arrival on-time performance percentage. Calculated as on_time_arr
          divided by flights with actual_arr IS NOT NULL. Rounded to 2 decimal places.
          NULL-safe via NULLIF denominator. NULL when no relevant flights operated.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100

      - name: cancellation_rate_pct
        description: >
          Cancellation rate percentage. Calculated as cancelled_count divided by
          total_scheduled. Rounded to 2 decimal places. NULL-safe via NULLIF denominator.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100

  - name: daily_airport_operations
    description: >
      Daily airport-level summary grouped by actual_operation_date. Only includes
      flights that actually operated (actual_operation_date IS NOT NULL). Sources
      operating carrier flights from fct_flights. Uses the actual operation date
      rather than the scheduled date — this reflects when the physical aircraft
      movement occurred. Materialized as incremental delete+insert with a 7-day
      look-back window.

    columns:
      - name: actual_operation_date
        description: >
          Date on which the flights actually operated. Derived from the earlier of
          actual_dep or actual_arr. One row per day. NULL dates are excluded.
        tests:
          - unique
          - not_null

      - name: total_scheduled
        description: Total number of scheduled flights for this operation date
        tests:
          - not_null

      - name: total_actual
        description: >
          Total number of flights that actually operated (status NOT cancelled/canceled)
          for this operation date
        tests:
          - not_null

      - name: scheduled_dep
        description: Number of scheduled departures for this operation date
        tests:
          - not_null

      - name: scheduled_arr
        description: Number of scheduled arrivals for this operation date
        tests:
          - not_null

      - name: actual_dep
        description: Number of departures that actually operated for this operation date
        tests:
          - not_null

      - name: actual_arr
        description: Number of arrivals that actually operated for this operation date
        tests:
          - not_null

      - name: on_time_dep
        description: Number of on-time departures for this operation date
        tests:
          - not_null

      - name: on_time_arr
        description: Number of on-time arrivals for this operation date
        tests:
          - not_null

      - name: cancelled_count
        description: Number of cancelled flights for this operation date
        tests:
          - not_null

      - name: dep_otp_pct
        description: >
          Departure OTP percentage for this operation date, rounded to 2 decimal places.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100

      - name: arr_otp_pct
        description: >
          Arrival OTP percentage for this operation date, rounded to 2 decimal places.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100

      - name: cancellation_rate_pct
        description: >
          Cancellation rate percentage for this operation date, rounded to 2 decimal places.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100

  - name: daily_airline_summary
    description: >
      Daily airline-level summary grouped by flight_date and airline_iata.
      Sources ALL rows from int_flights_enriched (both operating and marketing
      carrier roles). This ensures marketing-only carriers (Air Transat, United,
      Swiss) that sell codeshare tickets but don't physically operate flights at YTZ
      still appear in airline dropdowns. Materialized as incremental delete+insert
      with a 7-day look-back window.

    columns:
      - name: flight_date
        description: Scheduled date of the flights (YYYY-MM-DD)
        tests:
          - not_null

      - name: airline_iata
        description: IATA two-letter airline designator (e.g., 'PD' for Porter Airlines)
        tests:
          - not_null

      - name: total_scheduled
        description: Total number of scheduled flights for this airline on this date
        tests:
          - not_null

      - name: total_actual
        description: >
          Total number of flights that actually operated for this airline on this date
        tests:
          - not_null

      - name: scheduled_dep
        description: Number of scheduled departures for this airline on this date
        tests:
          - not_null

      - name: scheduled_arr
        description: Number of scheduled arrivals for this airline on this date
        tests:
          - not_null

      - name: actual_dep
        description: Number of departures that actually operated for this airline on this date
        tests:
          - not_null

      - name: actual_arr
        description: Number of arrivals that actually operated for this airline on this date
        tests:
          - not_null

      - name: on_time_dep
        description: Number of on-time departures for this airline on this date
        tests:
